{% extends "base.html" %}
{% block title %}Сложные слова{% endblock %}
{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='learn.css') }}">
<div id="learn-root" data-mode="difficult" class="learn-page">
  <div class="topbar">
    <a href="{{ url_for('web.home') }}" class="pill-btn">← Назад к урокам</a>
    <a href="#" class="pill-btn ghost">Сложные слова</a>
  </div>

  <div id="progress" class="center-progress"></div>

  <div class="lang-switch">
    <button data-lang=""  class="lang-btn">Все</button>
    <button data-lang="nl" class="lang-btn">Dutch</button>
    <button data-lang="en" class="lang-btn">English</button>
    <button data-lang="ru" class="lang-btn">Русский</button>
  </div>

  <div id="word-view" class="card"></div>

  <div id="answer-slots" class="answer-field"></div>
  <div id="letters-pool" class="letter-grid"></div>

  <div class="builder">
    <div class="builder-controls">
      <div class="controls-row split">
        <button id="clear-btn" class="ctrl-btn">Сброс</button>
        <button id="undo-btn" class="ctrl-btn">↩ Вернуть букву</button>
      </div>
      <div class="controls-row center">
        <button id="check-btn" class="ctrl-btn check-btn">Проверить</button>
      </div>
    </div>
    <div class="nav-row">
      <button id="prev-btn" class="ctrl-btn">← Предыдущее</button>
      <button id="next-btn" class="ctrl-btn">Следующее →</button>
    </div>
  </div>

  <!-- Модалка результата -->
  <div id="result-modal" class="modal" style="display:none" role="dialog" aria-modal="true" aria-labelledby="modal-line1">
    <div class="modal-content" id="modal-content"><!-- [ДОБАВЛЕНО] id для делегата -->
      <div class="modal-head">
        <div class="modal-head-actions">
          <label class="flag-toggle" title="Отметить как сложное">
            <input type="checkbox" id="difficultToggle" checked>
            <span class="icon">★</span>
          </label>
          <button id="modal-close" class="close" aria-label="Закрыть">×</button>
        </div>
      </div>
      <p id="modal-line1"></p>
      <p id="modal-line2"></p>
      <p id="modal-line3"></p>
      <div class="controls-row center" style="margin-top:12px">
        <button id="next-word-btn" class="ctrl-btn">Следующее слово</button>
        <!-- без «Следующий урок» -->
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script defer src="{{ url_for('static', filename='audio_worker.js') }}"></script>
<script defer src="{{ url_for('static', filename='difficult.js') }}"></script>
{% endblock %}
