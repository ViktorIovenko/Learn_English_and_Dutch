<!-- app/templates/base.html -->
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>{{ title or "Iovenko" }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="header">
    <div class="container">
      <h1>Iovenko</h1>
      <!-- [Скрытая старая панель] -->
      <div class="tabsbar" style="display:none">
        <div></div>
        <div id="userMini" class="user-mini"></div>
      </div>

      <!-- [ДОБАВЛЕНО v5.8] Панель аккаунта -->
      <section id="accountPanel" class="account-panel" aria-live="polite">
        <div class="acc-row">
          <div class="acc-item"><b>ID:</b> <span id="acc_id">—</span></div>
          <div class="acc-item"><b>username:</b> <span id="acc_username">—</span></div>
          <div class="acc-item"><b>first_name:</b> <span id="acc_first">—</span></div>
          <div class="acc-item"><b>last_name:</b> <span id="acc_last">—</span></div>
          <div class="acc-badge" id="acc_auth">auth: false</div>
        </div>
      </section>
      <!-- /Панель аккаунта -->
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <script>
    const tg = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;

    // [НЕ МЕНЯЛОСЬ] Разворачиваем WebApp и защита от случайного закрытия
    if (tg) { try { tg.expand(); tg.enableClosingConfirmation(); } catch(e){} }

    // [НЕ МЕНЯЛОСЬ] Быстрое имя для приветствия
    (function putNameInstant(){
      try{
        if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user){
          const u = tg.initDataUnsafe.user;
          const name = (u.first_name && u.first_name.trim())
                       ? u.first_name.trim()
                       : (u.username ? "@"+u.username : "");
          window._HELLO_NAME_ = name;
          document.dispatchEvent(new CustomEvent("hello-name-ready", {detail: name}));
        }
      }catch(e){}
    })();

    // [НЕ МЕНЯЛОСЬ] USER_ID для API (fallback через ?uid=)
    const params = new URLSearchParams(window.location.search);
    const urlUid = params.get("uid") || "";
    const tgUserId = (tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.id) || "";
    if (urlUid) localStorage.setItem("uid", urlUid);
    const USER_ID = tgUserId || localStorage.getItem("uid") || "";
    window.apiFetch = function(url, opts = {}) {
      const o = Object.assign({}, opts);
      o.headers = Object.assign({}, o.headers || {}, {"X-User-Id": USER_ID});
      return fetch(url, o);
    };

    // [ДОБАВЛЕНО v5.8] Утилиты для панели аккаунта
    function _setText(id, val){ try{ document.getElementById(id).textContent = val || "—"; }catch(e){} }
    function _setAuth(val){
      try{
        const el = document.getElementById("acc_auth");
        const ok = !!val;
        el.textContent = "auth: " + (ok ? "true" : "false");
        el.classList.toggle("ok", ok);
      }catch(e){}
    }
    function _fillFromTGUnsafe(){
      try{
        if (!tg || !tg.initDataUnsafe || !tg.initDataUnsafe.user) return;
        const u = tg.initDataUnsafe.user;
        _setText("acc_id", String(u.id||""));
        _setText("acc_username", u.username ? "@"+u.username : "");
        _setText("acc_first", u.first_name || "");
        _setText("acc_last", u.last_name || "");
      }catch(e){}
    }

    // [НЕ МЕНЯЛОСЬ] Авто-логин WebApp
    (async () => {
      try {
        const already = sessionStorage.getItem("auth_ok");
        if (!already && tg && tg.initData) {
          const resp = await fetch("/api/auth/login_webapp", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ init_data: tg.initData })
          });
          const js = await resp.json();
          if (js && js.ok) sessionStorage.setItem("auth_ok", "1");
        }
      } catch(e) {}

      // [ДОБАВЛЕНО v5.8] Сначала быстро показать то, что знаем от Telegram,
      // затем подтвердить с сервера (истинный источник).
      _fillFromTGUnsafe();
      try {
        const r = await apiFetch("/api/me");
        const me = await r.json();
        if (me && me.ok && me.auth) {
          _setText("acc_id", String(me.user_id||""));
          _setText("acc_username", me.username ? "@"+me.username : "");
          _setText("acc_first", me.first_name || "");
          _setText("acc_last", me.last_name || "");
          _setAuth(true);
          // Обновим имя для приветствия (если есть)
          const name = (me.first_name && me.first_name.trim())
                       ? me.first_name.trim()
                       : ((me.username && me.username.trim()) ? "@"+me.username.trim() : "");
          if (name) {
            window._HELLO_NAME_ = name;
            document.dispatchEvent(new CustomEvent("hello-name-ready", {detail: name}));
          }
        } else {
          _setAuth(false);
        }
      } catch(e) { _setAuth(false); }
    })();
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
