<!-- app/templates/base.html -->
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>{{ title or "Learning words" }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="header">
    <!-- [ДОБАВЛЕНО v5.11] Контейнер с 10-минутным таймером -->
    <div class="container">
      <div id="daily-timer" class="daily-timer" role="group" aria-label="10-minute study timer">
        <span class="dt-label" id="dt_label">Ежедневная цель:</span>
        <span class="dt-time" id="dt_time" aria-live="polite">10:00</span>
        <button id="dt_pause" class="pill-btn small" type="button" aria-pressed="false">Пауза</button>
        <!-- [ДОБАВЛЕНО v5.13] Кнопка перезапуска -->
        <button id="dt_restart" class="pill-btn small" type="button" title="Перезапустить таймер">Перезапуск</button>
        <button id="dt_reset" class="pill-btn small ghost" type="button" style="display:none">Сброс</button>
      </div>
    </div>
    <!-- /[ДОБАВЛЕНО v5.11] -->
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <script>
    const tg = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
    if (tg) { try { tg.expand(); tg.enableClosingConfirmation(); } catch(e){} }
    (function putNameInstant(){
      try{
        if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user){
          const u = tg.initDataUnsafe.user;
          const name = (u.first_name && u.first_name.trim())
                       ? u.first_name.trim()
                       : (u.username ? "@"+u.username : "");
          window._HELLO_NAME_ = name;
          document.dispatchEvent(new CustomEvent("hello-name-ready", {detail: name}));
        }
      }catch(e){}
    })();
    const params = new URLSearchParams(window.location.search);
    const urlUid = params.get("uid") || "";
    const tgUserId = (tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.id) || "";
    if (urlUid) localStorage.setItem("uid", urlUid);
    const USER_ID = tgUserId || localStorage.getItem("uid") || "";
    window.apiFetch = function(url, opts = {}) {
      const o = Object.assign({}, opts);
      o.headers = Object.assign({}, o.headers || {}, {"X-User-Id": USER_ID});
      return fetch(url, o);
    };
    function _setText(id, val){ try{ document.getElementById(id).textContent = val || "—"; }catch(e){} }
    function _setAuth(val){
      try{
        const el = document.getElementById("acc_auth");
        const ok = !!val;
        el.textContent = "auth: " + (ok ? "true" : "false");
        el.classList.toggle("ok", ok);
      }catch(e){}
    }
    function _fillFromTGUnsafe(){
      try{
        if (!tg || !tg.initDataUnsafe || !tg.initDataUnsafe.user) return;
        const u = tg.initDataUnsafe.user;
        _setText("acc_id", String(u.id||""));
        _setText("acc_username", u.username ? "@"+u.username : "");
        _setText("acc_first", u.first_name || "");
        _setText("acc_last", u.last_name || "");
      }catch(e){}
    }
    (async () => {
      try {
        const already = sessionStorage.getItem("auth_ok");
        if (!already && tg && tg.initData) {
          const resp = await fetch("/api/auth/login_webapp", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ init_data: tg.initData })
          });
          const js = await resp.json();
          if (js && js.ok) sessionStorage.setItem("auth_ok", "1");
        }
      } catch(e) {}
      _fillFromTGUnsafe();
      try {
        const r = await apiFetch("/api/me");
        const me = await r.json();
        if (me && me.ok && me.auth) {
          _setText("acc_id", String(me.user_id||""));
          _setText("acc_username", me.username ? "@"+me.username : "");
          _setText("acc_first", me.first_name || "");
          _setText("acc_last", me.last_name || "");
          _setAuth(true);
          const name = (me.first_name && me.first_name.trim())
                       ? me.first_name.trim()
                       : ((me.username && me.username.trim()) ? "@"+me.username.trim() : "");
          if (name) {
            window._HELLO_NAME_ = name;
            document.dispatchEvent(new CustomEvent("hello-name-ready", {detail: name}));
          }
        } else {
          _setAuth(false);
        }
      } catch(e) { _setAuth(false); }
    })();
    /* ===========================================
       [ИЗМЕНЕНО v5.12] Таймер с сохранением в sessionStorage
       - НЕ сбрасывается при переходе по страницам
       - Сбрасывается только при полном закрытии WebApp/браузера
       =========================================== */
    (function attachDailyTimer(){
      const wrap    = document.getElementById('daily-timer');
      const timeEl  = document.getElementById('dt_time');
      const pause   = document.getElementById('dt_pause');
      const restart = document.getElementById('dt_restart'); // [ДОБАВЛЕНО v5.13]
      const reset   = document.getElementById('dt_reset');
      if (!wrap || !timeEl || !pause || !reset || !restart) return;

      const TOTAL = 10 * 60; // 10 минут

      function readState(){
        let remaining = Number(sessionStorage.getItem('dt_remaining'));
        let running   = sessionStorage.getItem('dt_running');
        let lastTs    = Number(sessionStorage.getItem('dt_last'));
        if (!Number.isFinite(remaining) || remaining <= 0 || remaining > TOTAL) remaining = TOTAL;
        if (running === null) running = '1';
        if (!Number.isFinite(lastTs) || lastTs <= 0) lastTs = Date.now();
        if (running === '1') {
          const now = Date.now();
          const deltaSec = Math.floor((now - lastTs) / 1000);
          if (deltaSec > 0) {
            remaining = Math.max(0, remaining - deltaSec);
            lastTs = now;
          }
        }
        return { remaining, running: (running === '1'), lastTs };
      }
      function writeState(state){
        sessionStorage.setItem('dt_remaining', String(state.remaining));
        sessionStorage.setItem('dt_running',   state.running ? '1' : '0');
        sessionStorage.setItem('dt_last',      String(state.lastTs));
      }

      let state = readState();

      function fmt(sec){
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        return String(m) + ':' + String(s).padStart(2,'0');
      }
      function render(){
        timeEl.textContent = fmt(state.remaining);
        wrap.classList.toggle('done', state.remaining <= 0);
        pause.style.display  = state.remaining <= 0 ? 'none' : '';
        reset.style.display  = state.remaining <= 0 ? '' : 'none';
        // restart всегда виден
        restart.style.display = ''; // [ДОБАВЛЕНО v5.13]
        pause.textContent = state.running ? 'Пауза' : 'Продолжить';
        pause.setAttribute('aria-pressed', state.running ? 'false' : 'true');
      }

      let tickId = null;
      function stopTick(){ if (tickId){ clearInterval(tickId); tickId = null; } }
      function startTick(){
        stopTick();
        tickId = setInterval(()=>{
          if (!state.running || state.remaining <= 0) return;
          const now = Date.now();
          const deltaSec = Math.floor((now - state.lastTs) / 1000);
          if (deltaSec >= 1){
            state.remaining = Math.max(0, state.remaining - deltaSec);
            state.lastTs = now;
            writeState(state);
            render();
          }
        }, 1000);
      }

      pause.addEventListener('click', ()=>{
        state.running = !state.running;
        state.lastTs  = Date.now();
        writeState(state);
        render();
        if (state.running && !tickId) startTick();
      });

      reset.addEventListener('click', ()=>{
        state.remaining = TOTAL;
        state.running   = true;
        state.lastTs    = Date.now();
        writeState(state);
        render();
        startTick();
      });

      // [ДОБАВЛЕНО v5.13] Обработчик «Перезапуск»
      restart.addEventListener('click', ()=>{
        state.remaining = TOTAL;   // сброс до 10:00
        state.running   = true;    // сразу запустить
        state.lastTs    = Date.now();
        writeState(state);
        render();
        startTick();
      });

      window.addEventListener('beforeunload', ()=>{
        if (state.running){
          const now = Date.now();
          const deltaSec = Math.floor((now - state.lastTs) / 1000);
          if (deltaSec > 0){
            state.remaining = Math.max(0, state.remaining - deltaSec);
            state.lastTs = now;
          }
        }
        writeState(state);
      });

      writeState(state);
      render();
      startTick();
    })();
    /* ===== /Сеансовый таймер ===== */
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
