{% extends "base.html" %}
{% block title %}Обучение{% endblock %}
{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='learn.css') }}">
<div id="learn-root" data-lesson="{{ lesson_title }}" class="learn-page">
  <div class="topbar">
    <a href="{{ url_for('web.home') }}" class="pill-btn">
      <span class="txt-full">← Назад к урокам</span>
      <span class="txt-short">← Назад</span>
    </a>
    <!-- [ИЗМЕНЕНО v8.16] Показываем имя текущего урока -->
    <span class="pill-btn ghost lesson-pill">
      <span class="lesson-pill-title">{{ lesson_title }}</span>
      <label class="chk lesson-learned" title="Урок выучен">
        <input type="checkbox" id="lesson-learned-toggle" data-lesson="{{ lesson_title }}" aria-label="Урок выучен">
      </label>
    </span>
    <!-- [ДОБАВЛЕНО v8.17] Раздвижка вправо + кнопка «Следующий урок» -->
    <div class="spacer"></div>
    <a href="#" id="next-lesson-btn" class="pill-btn" title="Перейти к следующему уроку">
      <span class="txt-full">Следующий урок →</span>
      <span class="txt-short">Далее →</span>
    </a>
  </div>
  <div id="progress" class="center-progress"></div>
  <div class="lang-switch">
    <button data-lang=""  class="lang-btn">Все</button>
    <button data-lang="nl" class="lang-btn">Dutch</button>
    <button data-lang="en" class="lang-btn">English</button>
    <button data-lang="ru" class="lang-btn">Русский</button>
  </div>
  <div id="word-view" class="card"></div>
  <!-- поле ответа сверху, буквы ниже -->
  <div id="answer-slots" class="answer-field"></div>
  <div class="letter-grid" id="letters-pool"></div>
  <div class="builder">
    <div class="builder-controls">
      <!-- <div class="controls-row split">
        <button id="clear-btn" class="ctrl-btn">Сброс</button>
        <button id="undo-btn" class="ctrl-btn">↩ Вернуть букву</button>
      </div> -->
      <div class="controls-row center">
        <button id="check-btn" class="ctrl-btn check-btn">Проверить</button>
      </div>
    </div>
    <div class="nav-row">
      <button id="prev-btn" class="ctrl-btn">← Предыдущее</button>
      <button id="next-btn" class="ctrl-btn">Следующее →</button>
    </div>
  </div>

  <!-- Модалка проверки -->
  <div id="result-modal" class="modal" style="display:none" role="dialog" aria-modal="true" aria-labelledby="modal-line1">
    <div class="modal-content" id="modal-content">
      <div class="modal-head">
        <div class="modal-head-actions">
          <label class="flag-toggle" title="Отметить как сложное">
            <input type="checkbox" id="difficultToggle">
            <span class="icon">★</span>
          </label>
          <button id="modal-close" class="close" aria-label="Закрыть">×</button>
        </div>
      </div>
      <p id="modal-line1"></p>

      <!-- [УДАЛЕНО v8.24] Блок с кнопкой аудио и текстом-подсказкой -->
      <!-- был div.controls-row с #modal-audio-btn и «Прослушать правильное слово» -->

      <p id="modal-line2"></p>
      <p id="modal-line3"></p>
      <div class="controls-row center" style="margin-top:12px">
        <button id="next-word-btn" class="ctrl-btn">Следующее слово</button>
        <button id="next-lesson-modal-btn" class="ctrl-btn" style="display:none">Следующий урок →</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
  // [ИЗМЕНЕНО v8.18] Гарантируем валидный JS-литерал даже при пустом lesson_title
  window.LESSON_TITLE = {{ lesson_title|default('')|tojson }};
</script>
<!-- [ДОБАВЛЕНО v8.6 AUDIO] Глобальный воркер озвучки -->
<script defer src="{{ url_for('static', filename='audio_worker.js') }}"></script>
<!-- [НЕ МЕНЯЛОСЬ] основной скрипт -->
<script defer src="{{ url_for('static', filename='learn.js') }}"></script>
<!-- [ИЗМЕНЕНО v8.5] fallback: уважает флаг __LEARN_BOOTЕД__ -->
<script>
(function(){
  function pickLessonTitle(){
    var root = document.getElementById('learn-root');
    var q = new URLSearchParams(location.search);
    return (root && root.dataset.lesson) || window.LESSON_TITLE || q.get('lesson') || '';
  }
  function idbPrefix(){
    return window.IDB_KEY_PREFIX || (window.USER_ID ? "uid:" + window.USER_ID + ":" : "uid:anon:");
  }
  function idbKey(key){
    return idbPrefix() + key;
  }
  function bootFallback(){
    if (window.__LEARN_BOOTED__) return;
    var lesson = pickLessonTitle();
    var box = document.getElementById('word-view');
    if (!lesson){ if(box) box.textContent='Урок не выбран.'; return; }
    function renderItems(items){
      if (window.__LEARN_BOOTED__) return;
      if(!items || !items.length){ if(box) box.textContent='В этом уроке пока нет слов.'; return; }
      var w = items[0];
      box.innerHTML =
        '<div><b>(nl)</b> ' + (w.translation_nl||'') + '</div>' +
        '<div style="margin-bottom:4px">' + (w.sentence_nl||'') + '</div>' +
        '<div><b>(en)</b> ' + (w.word_en||'') + '</div>' +
        '<div style="margin-bottom:4px">' + (w.sentence_en||'') + '</div>' +
        '<div><b>(ru)</b> ' + (w.translation_ru||'') + '</div>' +
        '<div style="margin-bottom:8px">' + (w.sentence_ru||'') + '</div>';
    }
    function loadFromServer(){
      if (box) box.textContent = 'Загрузка...';
      fetch('/api/lesson_words?lesson=' + encodeURIComponent(lesson))
        .then(r=>r.json())
        .then(js=>{
          if (window.__LEARN_BOOTED__) return;
          if(!js || js.ok===false){ if(box) box.textContent='Ошибка загрузки слов.'; return; }
          var items = js.items||[];
          if (window.LocalDB && items && items.length){
            window.LocalDB.set('words', items, idbKey('lesson:' + lesson)).catch(()=>{});
          }
          renderItems(items);
        })
        .catch(()=>{ if(!window.__LEARN_BOOTED__ && box) box.textContent='Сеть недоступна.'; });
    }
    if (window.LocalDB){
      window.LocalDB.get('words', idbKey('lesson:' + lesson))
        .then(function(cached){
          if (cached && cached.length) renderItems(cached);
          else loadFromServer();
        })
        .catch(loadFromServer);
    } else {
      loadFromServer();
    }
  }
  setTimeout(bootFallback, 600);
})();
</script>
{% endblock %}
