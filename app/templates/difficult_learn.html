{% extends "base.html" %}
{% block content %}
<h2>Сложные слова</h2>
<div class="toolbar">
  <label>Язык обучения:
    <select id="lang">
      <option value="nl">Учить NL→EN/RU</option>
      <option value="en">Учить EN→NL/RU</option>
    </select>
  </label>
</div>
<div id="words" class="grid"></div>
{% endblock %}
{% block scripts %}
<script type="module">
  const langSel = document.getElementById("lang");
  const wordsEl = document.getElementById("words");

  async function loadWords() {
    const r = await apiFetch(`/api/difficult_words_user`);
    const js = await r.json();
    const items = (js && js.items) ? js.items : [];
    const lang = langSel.value;

    wordsEl.innerHTML = "";
    items.forEach(w => {
      const srcWord  = (lang === "nl") ? w.nl_word : w.en_word;
      const srcAudio = (lang === "nl") ? w.nl_audio : w.en_audio;
      const trgWord  = (lang === "nl") ? `${w.en_word} / ${w.ru_word}` : `${w.nl_word} / ${w.ru_word}`;

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="card-title">${srcWord}</div>
        <div class="card-sub">${trgWord}</div>
        <div class="sentences">
          ${w.nl_sentence ? `<div><b>NL:</b> ${w.nl_sentence}</div>` : ""}
          ${w.en_sentence ? `<div><b>EN:</b> ${w.en_sentence}</div>` : ""}
          ${w.ru_sentence ? `<div><b>RU:</b> ${w.ru_sentence}</div>` : ""}
        </div>
        <div class="actions">
          ${srcAudio ? `<audio controls src="${srcAudio}"></audio>` : ""}
          <label class="chk">
            <input type="checkbox" checked
                   data-id="${w.id}" data-number="${w.number||''}"
                   class="diff-toggle">
            В «сложные»
          </label>
        </div>
      `;
      wordsEl.appendChild(card);
    });

    document.querySelectorAll(".diff-toggle").forEach(chk => {
      chk.addEventListener("change", async (e) => {
        const id      = e.target.dataset.id || "";
        const number  = e.target.dataset.number || "";
        const difficult = e.target.checked ? 1 : 0;
        await apiFetch("/api/difficult/set", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({ id, number, difficult })
        });
        // если сняли чекбокс — убираем карточку из списка
        if (!difficult) {
          e.target.closest(".card")?.remove();
        }
      });
    });
  }

  langSel.addEventListener("change", loadWords);
  loadWords();
</script>
{% endblock %}
